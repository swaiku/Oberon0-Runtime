changelog_type: commit_message
commit_changelog: true

header_prefix: "Version:"
version_prefix: "v"

group_config:
  - title: "✨ Features"
    labels:
      - "feat"
    commit_pattern: "^(✨|:sparkles:|⚡|:zap:)"

  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
    commit_pattern: "^(🐛|:bug:|🚑|:ambulance:)"

  - title: "♻️ Refactoring"
    commit_pattern: "^(♻️|:recycle:)"

  - title: "📦 Build & Dependencies"
    commit_pattern: "^(📦|:package:|⬆️|:arrow_up:|⬇️|:arrow_down:)"

  - title: "📝 Documentation"
    commit_pattern: "^(📝|:memo:|📖|:book:)"

  - title: "🔧 Configuration"
    commit_pattern: "^(🔧|:wrench:|🔨|:hammer:)"

  - title: "✅ Tests"
    commit_pattern: "^(✅|:white_check_mark:|🧪|:test_tube:)"

include_unlabeled_changes: true
unlabeled_group_title: "🔀 Other Changes"
